# Sector Cycle Rulebook v2 — 시장 자금 흐름 사이클 규칙서
# 구조: 1차 주도 → 2차 수혜 → 3차 후행 → 피해/주의
# 주의: 매수·매도 지시 아님. 통계적 관찰 후보 분류용.

version: "2.0"

cycles:

  # ── A. 금리 하락 / 위험선호 사이클 ──────────────────────────────────────
  - cycle_id: rate_cut_risk_on
    name: 금리 하락 / 위험선호
    macro_regime: risk_on
    trigger_keywords:
      - 금리인하
      - 피벗
      - 금리 하락
      - 고용 둔화
      - 실업률 상승
      - 달러 약세
      - 나스닥 강세
      - 코스닥 강세
      - FOMC 인하
      - CPI 둔화
    source_sectors: [채권, 금리, 통화정책, 연준]
    confirmation_data:
      - "미국 10년물 국채 하락 (4.0% 미만)"
      - "달러지수(DXY) 하락 (100 미만)"
      - "공포탐욕지수 개선 (55 이상)"
      - "VIX 하락 (20 미만)"
    invalidation_conditions:
      - "CPI/PCE 재상승으로 금리인하 기대 후퇴"
      - "연준 매파 발언으로 피벗 기대 약화"
      - "고용지표 재강세"
    first_order_beneficiaries:
      - sector: 증권
        connection: 금리 하락 → 거래대금 증가 + 위험선호 회복 → 증권사 수익 기대
        symbols:
          - {symbol: 016360.KS, name: 삼성증권}
          - {symbol: 071050.KS, name: 한국금융지주}
          - {symbol: 039490.KS, name: 키움증권}
          - {symbol: 005940.KS, name: NH투자증권}
          - {symbol: SCHW, name: Charles Schwab}
          - {symbol: GS, name: Goldman Sachs}
      - sector: 반도체
        connection: 금리 하락 → 고PER 성장주 밸류에이션 부담 완화 → 반도체 선호
        symbols:
          - {symbol: 000660.KS, name: SK하이닉스}
          - {symbol: 005930.KS, name: 삼성전자}
          - {symbol: NVDA, name: NVIDIA}
          - {symbol: AMD, name: AMD}
          - {symbol: AVGO, name: Broadcom}
      - sector: 바이오
        connection: 금리 하락 → 고PER 성장주/바이오 밸류에이션 부담 완화 → 임상 파이프라인 재평가
        symbols:
          - {symbol: 207940.KS, name: 삼성바이오로직스}
          - {symbol: 068270.KS, name: 셀트리온}
          - {symbol: LLY, name: Eli Lilly}
          - {symbol: MRNA, name: Moderna}
      - sector: 부동산/리츠
        connection: 금리 하락 → 모기지 부담 완화 → 부동산 수요 회복 기대
        symbols:
          - {symbol: AMT, name: American Tower}
          - {symbol: SPG, name: Simon Property}
    second_order_beneficiaries:
      - sector: 건설
        connection: 금리 하락 → 부동산 회복 → 건설 수주 증가 기대 (금리인하 확인 필요)
        symbols:
          - {symbol: 000720.KS, name: 현대건설}
          - {symbol: 006360.KS, name: GS건설}
          - {symbol: 047040.KS, name: 대우건설}
      - sector: 소비재
        connection: 금리 하락 → 가계 부담 완화 → 소비 회복 기대
        symbols:
          - {symbol: AMZN, name: Amazon}
          - {symbol: 004370.KS, name: 농심}
      - sector: 광고/미디어
        connection: 위험선호 회복 → 기업 광고비 지출 증가 기대
        symbols:
          - {symbol: GOOGL, name: Alphabet}
          - {symbol: META, name: Meta}
    third_order_beneficiaries:
      - sector: 여행/면세
        connection: 소비 회복 → 여행·면세 수요 후행 기대
        symbols:
          - {symbol: 039130.KS, name: 하나투어}
          - {symbol: MAR, name: Marriott}
          - {symbol: ABNB, name: Airbnb}
    victims:
      - sector: 은행
        connection: 금리 하락 → NIM(순이자마진) 축소 → 은행 수익성 부담
        symbols:
          - {symbol: 105560.KS, name: KB금융}
          - {symbol: 055550.KS, name: 신한지주}
          - {symbol: JPM, name: JP Morgan}
          - {symbol: BAC, name: Bank of America}
    overheated_risks:
      - "성장주 PER 급팽창 시 조정 위험"
      - "금리인하 기대 과도 선반영 후 실망"
    beginner_explanation: >
      금리가 내려갈 기대가 생기면 돈의 가격이 낮아져 성장주와 위험자산에 먼저 돈이
      들어옵니다. 이후 거래대금 증가로 증권주, 투자심리 개선으로 건설·소비주가
      후행할 수 있습니다. 단, 건설·소비는 금리인하가 실제로 확인되어야 효과가 납니다.

  # ── B. 금리 상승 / 위험회피 사이클 ──────────────────────────────────────
  - cycle_id: rate_hike_risk_off
    name: 금리 상승 / 위험회피
    macro_regime: risk_off
    trigger_keywords:
      - 금리 상승
      - CPI 상승
      - PCE 상승
      - 연준 긴축
      - 매파
      - 고용 강함
      - 달러 강세
      - 장기채 급등
      - 10년물 상승
    source_sectors: [채권, 금리, 통화정책, 연준]
    confirmation_data:
      - "미국 10년물 국채 상승 (4.5% 이상)"
      - "달러지수(DXY) 상승 (103 이상)"
      - "VIX 상승 (22 이상)"
      - "공포탐욕지수 하락 (45 미만)"
    invalidation_conditions:
      - "CPI 급락으로 금리인하 기대 재부상"
      - "경기침체 신호로 연준 인하 압박"
    first_order_beneficiaries:
      - sector: 은행
        connection: 금리 상승 → NIM 개선 → 은행 수익성 회복 기대
        symbols:
          - {symbol: 105560.KS, name: KB금융}
          - {symbol: 055550.KS, name: 신한지주}
          - {symbol: 086790.KS, name: 하나금융지주}
          - {symbol: JPM, name: JP Morgan}
          - {symbol: BAC, name: Bank of America}
          - {symbol: WFC, name: Wells Fargo}
      - sector: 보험
        connection: 금리 상승 → 채권 운용 수익 개선 → 보험사 수익성 기대
        symbols:
          - {symbol: 000810.KS, name: 삼성화재}
          - {symbol: 032830.KS, name: 삼성생명}
          - {symbol: MET, name: MetLife}
          - {symbol: PRU, name: Prudential}
      - sector: 에너지/방어주
        connection: 위험회피 → 실물 자산·배당주 선호 → 에너지·방어주 유입
        symbols:
          - {symbol: XOM, name: ExxonMobil}
          - {symbol: CVX, name: Chevron}
          - {symbol: PG, name: Procter & Gamble}
    second_order_beneficiaries: []
    third_order_beneficiaries: []
    victims:
      - sector: 고PER 성장주/바이오
        connection: 금리 상승 → 미래 현금흐름 할인율 상승 → 고PER 밸류에이션 부담
        symbols:
          - {symbol: NVDA, name: NVIDIA}
          - {symbol: TSLA, name: Tesla}
          - {symbol: MRNA, name: Moderna}
          - {symbol: 207940.KS, name: 삼성바이오로직스}
      - sector: 부동산/건설
        connection: 금리 상승 → 모기지·PF 부담 증가 → 부동산 수요 억제
        symbols:
          - {symbol: 000720.KS, name: 현대건설}
          - {symbol: 006360.KS, name: GS건설}
          - {symbol: AMT, name: American Tower}
    overheated_risks:
      - "금리 급등 시 신용경색 전이 위험"
      - "경기침체 동반 시 은행도 함께 하락 가능"
    beginner_explanation: >
      금리가 오르면 미래 성장 기대보다 현재 이익과 현금흐름이 중요해집니다.
      고PER 성장주·바이오·건설·2차전지는 부담이 커지고, 은행·보험·에너지 같은
      현금흐름 안정주가 상대적으로 선호될 수 있습니다.

  # ── C. 증권주 강세 → 거래대금 / 위험선호 사이클 ────────────────────────
  - cycle_id: brokerage_risk_on
    name: 증권주 강세 → 거래대금/위험선호
    macro_regime: risk_on
    trigger_keywords:
      - 증권주 상승
      - 거래대금 증가
      - IPO 활성화
      - 코스닥 강세
      - 테마주 순환
      - 위험선호
    source_sectors: [증권, 금융, 거래대금]
    source_symbols:
      - {symbol: 016360.KS, name: 삼성증권}
      - {symbol: 071050.KS, name: 한국금융지주}
      - {symbol: 039490.KS, name: 키움증권}
    first_order_beneficiaries:
      - sector: 코스닥 성장주
        connection: 거래대금 증가 → 개인투자자 활성화 → 코스닥 성장주·소형주 수혜
        symbols:
          - {symbol: 086900.KS, name: 메디오젠}
          - {symbol: 196170.KS, name: 알테오젠}
      - sector: 바이오/AI소프트
        connection: 위험선호 회복 → 고성장 테마주 유입 가속
        symbols:
          - {symbol: 293490.KS, name: 카카오페이}
          - {symbol: 035720.KS, name: 카카오}
    second_order_beneficiaries:
      - sector: 건설/부동산 (금리 하락 동반 시에만)
        connection: >
          금리 하락이 동시 발생할 때만 건설·부동산 후행 수혜 인정.
          증권주 단독 상승만으로는 건설 수혜 판단 금지.
        symbols:
          - {symbol: 000720.KS, name: 현대건설}
    victims:
      - sector: 과열 테마주
        connection: 거래대금 급증 + 테마 쏠림 → 단기 과열 후 차익 실현 위험
        symbols: []
    overheated_risks:
      - "증권주 단독 상승만으로 건설·부동산 후행 수혜 자동 판단 금지"
      - "IPO 과열 → 시장 유동성 분산 → 기존 종목 압박"
    confirmation_data:
      - "거래대금 일평균 15조 이상 (KR)"
      - "코스닥 지수 동반 강세"
      - "공포탐욕지수 55 이상"
    invalidation_conditions:
      - "금리 상승 동반 시 건설/부동산 후행 수혜 무효"
      - "거래대금 급감 시 위험선호 약화"
    beginner_explanation: >
      증권주가 오른다는 것은 시장 거래대금이 늘고 투자자들이 위험자산에 적극적으로
      참여한다는 신호입니다. 이때 바이오·AI소프트웨어·코스닥 성장주가 후행할 수 있지만,
      건설·부동산은 반드시 금리 하락이 동반되어야 수혜입니다.

  # ── D. 건설 / 인프라 사이클 ─────────────────────────────────────────────
