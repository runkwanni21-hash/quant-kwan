        symbols:
          - {symbol: 267260.KS, name: HD현대일렉트릭}
          - {symbol: 298040.KS, name: 효성중공업}
          - {symbol: 010120.KS, name: LS ELECTRIC}
      - sector: 운송/물류
        connection: 건설 자재 물동량 증가 → 물류 수요 기대
        symbols:
          - {symbol: 000120.KS, name: CJ대한통운}
